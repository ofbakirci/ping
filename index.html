<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0A0A0C">
  <title>PING</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="c"></canvas>

  <!-- Title screen + level select (DOM overlay, hidden during play) -->
  <div id="title" class="overlay" hidden>
    <div class="title-mark">PING</div>
    <div class="title-sub">tap to look. hold to move. the dark listens.</div>
    <ul id="levels" class="levels"></ul>
  </div>

  <!-- In-game HUD: level name, top-left -->
  <div id="hud" hidden></div>

  <!-- Level-name type-in banner -->
  <div id="banner"></div>

  <!-- Dev-only FPS counter (?dev) -->
  <div id="fps" hidden></div>

  <script src="levels.js"></script>
  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
